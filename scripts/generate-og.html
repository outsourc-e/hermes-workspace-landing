<!DOCTYPE html>
<html>
<head><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: white; }
.title { font-size: 72px; font-weight: 800; letter-spacing: -1px; margin-bottom: 16px; }
.subtitle { font-size: 28px; color: #a5b4fc; margin-bottom: 48px; }
.features { display: flex; gap: 32px; }
.feature { display: flex; align-items: center; gap: 8px; font-size: 20px; color: #c4b5fd; background: rgba(255,255,255,0.08); padding: 10px 20px; border-radius: 24px; }
.badge { position: absolute; top: 40px; right: 40px; font-size: 18px; color: #a5b4fc; background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 12px; }
</style></head>
<body>
  <div class="badge">⭐ 560+ Stars on GitHub</div>
  <div class="title">Hermes Workspace</div>
  <div class="subtitle">Your AI agent's command center</div>
  <div class="features">
    <div class="feature">💬 Chat</div>
    <div class="feature">📁 Files</div>
    <div class="feature">🧠 Memory</div>
    <div class="feature">⚡ Skills</div>
    <div class="feature">📊 Dashboard</div>
  </div>
</body>
</html>
